[[skills]]
name = "client.requests.fetch"
description = "Fetch remote content with the requests library from inside the Binlex MCP Python runtime."
instructions = "Use `requests` for HTTP GET requests, especially for Binlex MCP sample download paths or other HTTP-accessible artifacts. Expect request parameters in `args` such as `url`, `headers`, `params`, and `timeout`, and return status, selected headers, and either parsed JSON or a compact body preview."
python = """
import hashlib
import requests

request_args = args or {}
url = request_args.get("url") or path
headers = request_args.get("headers") or {}
params = request_args.get("params") or {}
timeout = request_args.get("timeout", 30)

response = requests.get(url, headers=headers, params=params, timeout=timeout)
content_type = response.headers.get("content-type", "")
body_preview = None
body_json = None

if "application/json" in content_type:
    try:
        body_json = response.json()
    except Exception:
        body_preview = response.text[:4000]
else:
    try:
        body_preview = response.text[:4000]
    except Exception:
        body_preview = None

result = {
    "skill": "client.requests.fetch",
    "url": url,
    "status_code": response.status_code,
    "content_type": content_type,
    "content_length": len(response.content),
    "sha256": hashlib.sha256(response.content).hexdigest(),
    "headers": {
        "content-type": response.headers.get("content-type"),
        "content-length": response.headers.get("content-length"),
        "x-binlex-sha256": response.headers.get("x-binlex-sha256"),
        "x-binlex-size": response.headers.get("x-binlex-size"),
    },
    "json": body_json,
    "body_preview": body_preview,
}
"""

[[skills]]
name = "workflow.yara.scan"
description = "Compile YARA rules with yara-python and scan a fetched or local target from inside the Binlex MCP runtime."
instructions = "Use `requests` to fetch a target when only a URL is available, or read `path` directly when the file exists in the MCP runtime. Expect `args` to provide either `rule_text` or `rule_path`, and either `url` or `path`. Return the matched rule names, namespaces, tags, strings, and a concise summary of why the target matched."
python = """
import pathlib
import requests
import yara

request_args = args or {}
rule_text = request_args.get("rule_text")
rule_path = request_args.get("rule_path")
url = request_args.get("url")
target_path = path or request_args.get("path")
timeout = request_args.get("timeout", 30)

if rule_text:
    rules = yara.compile(source=rule_text)
elif rule_path:
    rules = yara.compile(filepath=rule_path)
else:
    raise ValueError("provide `rule_text` or `rule_path`")

if url:
    response = requests.get(url, timeout=timeout)
    response.raise_for_status()
    matches = rules.match(data=response.content)
    target = url
elif target_path:
    matches = rules.match(filepath=str(pathlib.Path(target_path)))
    target = target_path
else:
    raise ValueError("provide `url` or `path`")

result = {
    "skill": "workflow.yara.scan",
    "target": target,
    "match_count": len(matches),
    "matches": [
        {
            "rule": match.rule,
            "namespace": match.namespace,
            "tags": list(match.tags),
            "strings": [
                {
                    "identifier": string.identifier,
                    "instances": [
                        {
                            "offset": instance.offset,
                            "matched_length": instance.matched_length,
                        }
                        for instance in string.instances
                    ],
                }
                for string in match.strings
            ],
        }
        for match in matches
    ],
}
"""

[[skills]]
name = "workflow.yara.create"
description = "Create a Binlex YARARule from structured inputs inside the Binlex MCP runtime."
instructions = "Build a `binlex.rules.YARARule` from `args`. Support rule-level fields like `name`, `comment`, `imports`, `tags`, `metadata`, `global`, and `private`. Support pattern inputs through `patterns`, `texts`, `regexes`, and `strings`. Support either a direct `condition` string or `condition_at_least` with `minimum` and `patterns`. Return the rendered rule text plus a compact summary of the constructed rule."
python = """
from binlex.rules import YARARule

request_args = args or {}
name = request_args.get("name")
comment = request_args.get("comment")

rule = YARARule(name, comment)

for value in request_args.get("imports", []) or []:
    rule.add_import(str(value))

for value in request_args.get("tags", []) or []:
    rule.add_tag(str(value))

if request_args.get("global"):
    rule.set_global(True)

if request_args.get("private"):
    rule.set_private(True)

for key, value in (request_args.get("metadata") or {}).items():
    rule.set_metadata(str(key), value)

for item in request_args.get("patterns", []) or []:
    if isinstance(item, dict):
        rule.add_pattern(item["pattern"], item.get("comment"))
    else:
        rule.add_pattern(str(item))

for item in request_args.get("texts", []) or []:
    if not isinstance(item, dict):
        rule.add_text(str(item))
        continue
    rule.add_text(
        item["text"],
        ascii=item.get("ascii", True),
        wide=item.get("wide", False),
        nocase=item.get("nocase", False),
        xor=item.get("xor", False),
        base64=item.get("base64", False),
        base64wide=item.get("base64wide", False),
        fullword=item.get("fullword", False),
        private=item.get("private", False),
        comment=item.get("comment"),
    )

for item in request_args.get("regexes", []) or []:
    if isinstance(item, dict):
        rule.add_regex(item["regex"], item.get("comment"))
    else:
        rule.add_regex(str(item))

for item in request_args.get("strings", []) or []:
    if isinstance(item, dict):
        rule.add_string(item["value"], item.get("comment"))
    else:
        rule.add_string(str(item))

condition_text = request_args.get("condition")
condition_at_least = request_args.get("condition_at_least")
if condition_text:
    rule.set_condition(rule.condition(condition_text))
elif isinstance(condition_at_least, dict):
    minimum = int(condition_at_least["minimum"])
    patterns = [str(value) for value in condition_at_least.get("patterns", [])]
    rule.set_condition(rule.condition_at_least(minimum, patterns))

rendered = rule.render()
patterns = rule.get_patterns()
condition = rule.get_condition()

result = {
    "skill": "workflow.yara.create",
    "name": rule.get_name(),
    "comment": rule.get_comment(),
    "imports": list(request_args.get("imports", []) or []),
    "tags": list(request_args.get("tags", []) or []),
    "metadata": rule.get_metadata(),
    "pattern_count": len(patterns),
    "pattern_names": [pattern.get_name() for pattern in patterns],
    "condition": None if condition is None else str(condition),
    "valid": rule.check(),
    "rendered": rendered,
}
"""
