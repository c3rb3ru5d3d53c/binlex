[[skills]]
name = "hashing.sha256"
description = "Compute a SHA-256 digest."
instructions = "Return a SHA-256 digest for the requested input or selected artifact. When hashing a file through `binlex.formats.File`, enable SHA-256 in the config and call `read()` before `sha256()`."
python = """
import binlex

config = binlex.Config()
config.formats.file.sha256.enabled = True
file = binlex.formats.File(path, config)
file.read()
sha256 = file.sha256()

result = {
    "skill": "hashing.sha256",
    "path": path,
    "paths": paths,
    "args": args,
    "sha256": None if sha256 is None else sha256.hexdigest(),
}
"""

[[skills]]
name = "hashing.tlsh"
description = "Compute a TLSH digest."
instructions = "Return a TLSH digest when available and explain if it cannot be computed. When hashing a file through `binlex.formats.File`, enable TLSH in the config and call `read()` before `tlsh()`."
python = """
import binlex

config = binlex.Config()
config.formats.file.tlsh.enabled = True
file = binlex.formats.File(path, config)
file.read()
tlsh = file.tlsh()

result = {
    "skill": "hashing.tlsh",
    "path": path,
    "paths": paths,
    "args": args,
    "tlsh": None if tlsh is None else tlsh.hexdigest(),
}
"""

