[[skills]]
name = "formats.file.sha256"
description = "Open a file and compute its SHA-256 digest."
instructions = "Return the file SHA-256 digest and basic context. For `binlex.formats.File`, call `read()` before `sha256()` or the digest may be unavailable because no bytes have been loaded."
python = """
import binlex

config = binlex.Config()
config.formats.file.sha256.enabled = True
file = binlex.formats.File(path, config)
file.read()
sha256 = file.sha256()

result = {
    "skill": "formats.file.sha256",
    "path": path,
    "size": file.size(),
    "sha256": None if sha256 is None else sha256.hexdigest(),
}
"""

