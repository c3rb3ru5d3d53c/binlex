[[skills]]
name = "formats.file"
description = "Open a file and summarize basic metadata."
instructions = "Use the file-level bindings, call `read()` before accessing content-derived properties, and return size, entropy, and any obvious traits."
python = """
import binlex

config = binlex.Config()
file = binlex.formats.File(path, config)
file.read()

result = {
    "skill": "formats.file",
    "path": path,
    "args": args,
    "size": file.size(),
    "magic": str(file.magic()),
    "entropy": file.entropy() if hasattr(file, "entropy") else None,
}
"""

