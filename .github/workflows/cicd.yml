name: Rust CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  native-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15-intel, macos-15, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry and Build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Dependencies (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev make automake autoconf libtool

      - name: Install Dependencies (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          brew list automake >/dev/null 2>&1 || brew install automake
          brew list autoconf >/dev/null 2>&1 || brew install autoconf
          brew list libtool >/dev/null 2>&1 || brew install libtool

      - name: Install Vulkan SDK (macOS)
        if: startsWith(matrix.os, 'macos-')
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Configure Vulkan Environment (macOS)
        if: startsWith(matrix.os, 'macos-')
        shell: bash
        run: |
          echo "DYLD_FALLBACK_LIBRARY_PATH=$VULKAN_SDK/lib${DYLD_FALLBACK_LIBRARY_PATH:+:$DYLD_FALLBACK_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "VK_ICD_FILENAMES=$VULKAN_SDK/share/vulkan/icd.d/MoltenVK_icd.json" >> "$GITHUB_ENV"
          echo "VK_LAYER_PATH=$VULKAN_SDK/share/vulkan/explicit_layer.d" >> "$GITHUB_ENV"

      - name: Install MSYS2 and Automake (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            automake
            autoconf
            make
            libtool

      - name: Enable Developer Command Prompt (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Run Unit Tests (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            cargo test && break
            echo "Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done

      - name: Run Unit Tests (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: cargo test

      - name: Build Project (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: make deb

      - name: Build Project (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: cargo build --release

      - name: Build Project (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: cargo build --release

      - name: Create Dist Directory
        run: mkdir dist

      - name: Copy Binary (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          copy target\release\binlex.exe dist\
          copy target\release\binlex-processor.exe dist\
          copy target\release\binlex-yara.exe dist\
          copy target\release\binlex-pdb.exe dist\
          copy target\release\binlex-elf-symbols.exe dist\
          copy target\release\binlex-macho-symbols.exe dist\
          copy target\release\binlex-rizin.exe dist\
          copy target\release\binlex-image.exe dist\
          copy target\release\binlex-hash.exe dist\

      - name: Copy Binary (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          cp target/release/binlex dist/
          cp target/release/binlex-processor dist/
          cp target/release/binlex-yara dist/
          cp target/release/binlex-pdb dist/
          cp target/release/binlex-elf-symbols dist/
          cp target/release/binlex-macho-symbols dist/
          cp target/release/binlex-rizin dist/
          cp target/release/binlex-image dist/
          cp target/release/binlex-hash dist/

      - name: Copy Binary (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          cp target/release/binlex dist/
          cp target/release/binlex-processor dist/
          cp target/release/binlex-yara dist/
          cp target/release/binlex-pdb dist/
          cp target/release/binlex-elf-symbols dist/
          cp target/release/binlex-macho-symbols dist/
          cp target/release/binlex-rizin dist/
          cp target/release/binlex-image dist/
          cp target/release/binlex-hash dist/
          cp target/debian/*.deb dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os }}-native-artifacts
          path: dist/

  archlinux-native-build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Cache Cargo Registry and Build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: archlinux-native-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            archlinux-native-cargo-

      - name: Install Dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel pkgconf openssl make automake autoconf libtool clang curl git

      - name: Set Up Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Run Unit Tests
        shell: bash
        run: |
          for attempt in 1 2 3; do
            cargo test && break
            echo "Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done

      - name: Build Project
        run: make zst

      - name: Create Dist Directory
        run: mkdir dist

      - name: Copy Binary
        run: |
          cp target/release/binlex dist/
          cp target/release/binlex-processor dist/
          cp target/release/binlex-yara dist/
          cp target/release/binlex-pdb dist/
          cp target/release/binlex-elf-symbols dist/
          cp target/release/binlex-macho-symbols dist/
          cp target/release/binlex-rizin dist/
          cp target/release/binlex-image dist/
          cp target/release/binlex-hash dist/
          cp target/zst/*.zst dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: archlinux-native-artifacts
          path: dist/

  python-wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15-intel, macos-15, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry and Build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wheels-${{ runner.os }}-${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            wheels-${{ runner.os }}-${{ matrix.os }}-cargo-
            wheels-${{ runner.os }}-cargo-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Dependencies (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev make automake autoconf libtool

      - name: Install Dependencies (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          brew list automake >/dev/null 2>&1 || brew install automake
          brew list autoconf >/dev/null 2>&1 || brew install autoconf
          brew list libtool >/dev/null 2>&1 || brew install libtool

      - name: Install Vulkan SDK (macOS)
        if: startsWith(matrix.os, 'macos-')
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Configure Vulkan Environment (macOS)
        if: startsWith(matrix.os, 'macos-')
        shell: bash
        run: |
          echo "DYLD_FALLBACK_LIBRARY_PATH=$VULKAN_SDK/lib${DYLD_FALLBACK_LIBRARY_PATH:+:$DYLD_FALLBACK_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "VK_ICD_FILENAMES=$VULKAN_SDK/share/vulkan/icd.d/MoltenVK_icd.json" >> "$GITHUB_ENV"
          echo "VK_LAYER_PATH=$VULKAN_SDK/share/vulkan/explicit_layer.d" >> "$GITHUB_ENV"

      - name: Install MSYS2 and Automake (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            automake
            autoconf
            make
            libtool

      - name: Enable Developer Command Prompt (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install Python Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel

      - name: Build Python Wheels
        uses: pypa/cibuildwheel@v3.2.0
        env:
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
          CIBW_BEFORE_ALL_LINUX: >-
            bash -lc 'if command -v dnf >/dev/null 2>&1; then
            dnf install -y pkg-config openssl-devel make automake autoconf libtool;
            elif command -v yum >/dev/null 2>&1; then
            yum install -y pkg-config openssl-devel make automake autoconf libtool;
            elif command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y pkg-config libssl-dev make automake autoconf libtool;
            else
            echo "Unsupported package manager for cibuildwheel linux image" >&2; exit 1;
            fi'
        with:
          package-dir: bindings/python
          output-dir: wheelhouse

      - name: Upload Wheel Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os }}-python-wheels
          path: wheelhouse/

  archlinux-python-wheels:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Cache Cargo Registry and Build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: archlinux-wheels-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            archlinux-wheels-cargo-

      - name: Install Dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel pkgconf openssl make automake autoconf libtool clang curl git python python-pip

      - name: Set Up Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Set Up Python Build Tools
        shell: bash
        run: |
          python -m venv .wheel-tools
          .wheel-tools/bin/pip install --upgrade pip
          .wheel-tools/bin/pip install maturin uv
          echo "$GITHUB_WORKSPACE/.wheel-tools/bin" >> "$GITHUB_PATH"

      - name: Build Python Wheels
        shell: bash
        run: |
          mkdir -p wheelhouse
          uv python install 3.9 3.10 3.11 3.12 3.13 3.14
          python -m maturin build --release \
            --manifest-path bindings/python/Cargo.toml \
            --out wheelhouse \
            --interpreter \
              "$(uv python find 3.9)" \
              "$(uv python find 3.10)" \
              "$(uv python find 3.11)" \
              "$(uv python find 3.12)" \
              "$(uv python find 3.13)" \
              "$(uv python find 3.14)"

      - name: Upload Wheel Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: archlinux-python-wheels
          path: wheelhouse/

  ida-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build IDA Plugin Package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          cd plugins/ida/
          python -m pip install .
          python -m build
          python -m plugin archive --output ../../dist/binlex-ida.zip

      - name: Upload IDA Plugin Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ida-plugin-artifacts
          path: |
            dist/binlex-ida.zip
            plugins/ida/dist/*

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache Cargo Registry and Build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: docs-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            docs-${{ runner.os }}-cargo-

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev make automake autoconf libtool

      - name: Install Python Build Tools
        run: python -m pip install --upgrade pip

      - name: Build Rust API Docs
        run: cargo doc -p binlex --no-deps

      - name: Build Python API Docs
        run: |
          cd bindings/python/
          python -m pip install ".[docs]"
          python -m docs

      - name: Upload Rust Docs
        uses: actions/upload-artifact@v6
        with:
          name: rust-api-docs
          path: target/doc/

      - name: Upload Python Docs
        uses: actions/upload-artifact@v6
        with:
          name: python-api-docs
          path: bindings/python/docs/
