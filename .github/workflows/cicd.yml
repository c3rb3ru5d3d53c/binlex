name: Rust CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15-intel, macos-15, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry and Build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev make automake autoconf libtool

      - name: Install Dependencies (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          brew list automake >/dev/null 2>&1 || brew install automake
          brew list autoconf >/dev/null 2>&1 || brew install autoconf
          brew list libtool >/dev/null 2>&1 || brew install libtool

      - name: Install MSYS2 and Automake (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            automake
            autoconf
            make
            libtool

      - name: Enable Developer Command Prompt (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install Python Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel virtualenv

      - name: Run Unit Tests (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            cargo test && break
            echo "Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done

      - name: Run Unit Tests (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: cargo test

      - name: Build Project (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: make deb

      - name: Build Project (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: cargo build --release

      - name: Build Project (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: cargo build --release

      - name: Build Python Wheels (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          python -m venv venv
          . venv/bin/activate
          cd src/bindings/python/
          pip install maturin[patchelf]
          maturin build --release

      - name: Build Python Wheels (MacOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          python -m venv venv
          . venv/bin/activate
          cd src/bindings/python/
          pip install maturin
          maturin build --release

      - name: Build Python Wheels (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          python -m venv venv
          .\venv\Scripts\activate
          cd src/bindings/python/
          pip install maturin
          maturin build --release

      - name: Create Dist Directory
        run: mkdir dist

      - name: Copy Binary (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          copy target\release\binlex.exe dist\
          copy target\release\binlex-processor.exe dist\
          copy target\release\binlex-yara.exe dist\
          copy target\release\binlex-pdb.exe dist\
          copy target\release\binlex-elf-symbols.exe dist\
          copy target\release\binlex-macho-symbols.exe dist\
          copy target\release\binlex-rizin.exe dist\
          copy target\release\binlex-image.exe dist\
          copy target\release\binlex-hash.exe dist\
          copy target\wheels\*.whl dist\

      - name: Copy Binary (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          cp target/release/binlex dist/
          cp target/release/binlex-processor dist/
          cp target/release/binlex-yara dist/
          cp target/release/binlex-pdb dist/
          cp target/release/binlex-elf-symbols dist/
          cp target/release/binlex-macho-symbols dist/
          cp target/release/binlex-rizin dist/
          cp target/release/binlex-image dist/
          cp target/release/binlex-hash dist/
          cp target/wheels/*.whl dist/

      - name: Copy Binary (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          cp target/release/binlex dist/
          cp target/release/binlex-processor dist/
          cp target/release/binlex-yara dist/
          cp target/release/binlex-pdb dist/
          cp target/release/binlex-elf-symbols dist/
          cp target/release/binlex-macho-symbols dist/
          cp target/release/binlex-rizin dist/
          cp target/release/binlex-image dist/
          cp target/release/binlex-hash dist/
          cp target/debian/*.deb dist/
          cp target/wheels/*.whl dist/

      - name: Create binlex-ida.zip (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          mkdir dist\plugins\ida\binlex
          xcopy /E /I scripts\plugins\ida\binlex dist\plugins\ida\binlex
          powershell Compress-Archive -Path dist\plugins\ida\binlex\* -DestinationPath dist\plugins\ida\binlex-ida.zip
          powershell Remove-Item -Recurse -Force dist\plugins\ida\binlex

      - name: Create binlex-ida.zip (macOS and Ubuntu)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          mkdir -p dist/plugins/ida/binlex/
          cp -r scripts/plugins/ida/binlex/* dist/plugins/ida/binlex/
          cd dist/plugins/ida/ && zip -r binlex-ida.zip binlex
          rm -rf binlex

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os }}-artifacts-${{ strategy.job-index }}
          path: dist/

  archlinux:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install Arch Dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel curl git zip clang
          echo '%wheel ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          useradd -m -G wheel builder
          echo 'builder ALL=(ALL) NOPASSWD: /usr/bin/make' >> /etc/sudoers

      - name: Setup Rust
        run: |
          sudo -u builder bash -c 'curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y'
          sudo -u builder bash -c 'echo "export PATH=\\"$PATH:/home/builder/.cargo/bin\\"" >> /home/builder/.bashrc'
          sudo -u builder bash -c 'echo "source /home/builder/.cargo/env" >> /home/builder/.bashrc'

      - name: Checkout Code to Builder Home
        run: |
          sudo -u builder mkdir -p /home/builder/repo
          sudo -u builder bash -c "git clone https://github.com/${GITHUB_REPOSITORY}.git /home/builder/repo"
          sudo -u builder bash -c "cd /home/builder/repo && git fetch origin ${GITHUB_REF} && git checkout FETCH_HEAD"
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}

      - name: Build Project (Arch Linux)
        run: |
          sudo -u builder bash -c 'cd /home/builder/repo/ && . /home/builder/.cargo/env && make zst'

      - name: Run Unit Tests
        run: |
          sudo -u builder bash -c 'cd /home/builder/repo/ && . /home/builder/.cargo/env && cargo test'

      - name: Copy Binary (Arch Linux)
        run: |
          mkdir dist
          cp /home/builder/repo/target/release/binlex dist/
          cp /home/builder/repo/target/release/binlex-processor dist/
          cp /home/builder/repo/target/release/binlex-yara dist/
          cp /home/builder/repo/target/release/binlex-pdb dist/
          cp /home/builder/repo/target/release/binlex-elf-symbols dist/
          cp /home/builder/repo/target/release/binlex-macho-symbols dist/
          cp /home/builder/repo/target/release/binlex-rizin dist/
          cp /home/builder/repo/target/release/binlex-image dist/
          cp /home/builder/repo/target/release/binlex-hash dist/
          cp /home/builder/repo/target/zst/*.zst dist/

      - name: Create binlex-ida.zip
        run: |
          mkdir -p dist/plugins/ida/binlex/
          cp -r /home/builder/repo/scripts/plugins/ida/binlex/* dist/plugins/ida/binlex/
          cd dist/plugins/ida/ && zip -r binlex-ida.zip binlex
          rm -rf binlex

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: archlinux-artifacts
          path: dist/

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache Cargo Registry and Build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: docs-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            docs-${{ runner.os }}-cargo-

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev make automake autoconf libtool

      - name: Install Python Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin

      - name: Build Rust API Docs
        run: cargo doc --workspace --no-deps

      - name: Build Python API Docs
        run: |
          cd src/bindings/python/
          python -m pip install ".[docs]"
          maturin develop
          python -m docs

      - name: Upload Rust Docs
        uses: actions/upload-artifact@v6
        with:
          name: rust-api-docs
          path: target/doc/

      - name: Upload Python Docs
        uses: actions/upload-artifact@v6
        with:
          name: python-api-docs
          path: src/bindings/python/docs/
