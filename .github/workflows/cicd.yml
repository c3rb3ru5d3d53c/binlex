name: Rust CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PROTOC_VERSION: "33.0"
  LLVM_MAJOR_VERSION: "22"
  LLVM_WINDOWS_VERSION: "22.1.0"
  WINDOWS_CARGO_EXCLUDES: "--exclude binlex-python --exclude binlex-processor-vex --exclude libvex --exclude libvex-macros --exclude vex-sys"

jobs:
  native-build:
    name: native-build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            container: "null"
            asset: linux-x86_64
            archive_ext: tar.gz
          - os: archlinux
            runner: ubuntu-latest
            container: '{"image":"archlinux:latest"}'
            asset: archlinux-x86_64
            archive_ext: tar.gz
          - os: macos-14
            runner: macos-14
            container: "null"
            asset: macos-14-arm64
            archive_ext: tar.gz
          - os: macos-15-intel
            runner: macos-15-intel
            container: "null"
            asset: macos-15-intel-x86_64
            archive_ext: tar.gz
          - os: macos-15
            runner: macos-15
            container: "null"
            asset: macos-15-arm64
            archive_ext: tar.gz
          - os: windows-latest
            runner: windows-latest
            container: "null"
            asset: windows-x86_64
            archive_ext: zip

    runs-on: ${{ matrix.runner }}
    container: ${{ fromJSON(matrix.container) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Resolve Binlex Version
        shell: bash
        run: |
          version="$(./scripts/binlex-version.sh)"
          test -n "${version}"
          echo "BINLEX_VERSION=${version}" >> "$GITHUB_ENV"
          echo "ASSET_BASENAME=binlex-${version}-${{ matrix.asset }}" >> "$GITHUB_ENV"

      - name: Validate Release Tag Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "${TAG_VERSION}" = "${BINLEX_VERSION}"

      - name: Set up Rust
        if: ${{ matrix.os != 'archlinux' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Protoc
        if: ${{ matrix.os != 'archlinux' }}
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os == 'archlinux' && 'archlinux-native' || format('native-{0}', matrix.os) }}
          cache-provider: github

      - name: Install Dependencies (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev make automake autoconf libtool wget gnupg software-properties-common
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.LLVM_MAJOR_VERSION }}
          sudo apt-get install -y llvm-22-dev clang-22 libclang-common-22-dev libpolly-22-dev

      - name: Configure LLVM Environment (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: |
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"
          /usr/lib/llvm-22/bin/llvm-config --version

      - name: Install Dependencies (Arch Linux)
        if: ${{ matrix.os == 'archlinux' }}
        shell: bash
        run: |
          set -euo pipefail
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel pkgconf openssl zstd lz4 make automake autoconf libtool clang llvm curl git python rust protobuf
          id -u builder >/dev/null 2>&1 || useradd --create-home --shell /bin/bash builder

      - name: Configure LLVM Environment (Arch Linux)
        if: ${{ matrix.os == 'archlinux' }}
        shell: bash
        run: |
          echo "LLVM_SYS_221_PREFIX=/usr" >> "$GITHUB_ENV"
          echo "/usr/bin" >> "$GITHUB_PATH"
          llvm-config --version

      - name: Prepare Arch Build Workspace
        if: ${{ matrix.os == 'archlinux' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/binlex-build
          mkdir -p /tmp/binlex-build
          cp -a "$GITHUB_WORKSPACE"/. /tmp/binlex-build/
          chown -R builder:builder /tmp/binlex-build

      - name: Configure Arch Linker Wrapper
        if: ${{ matrix.os == 'archlinux' }}
        shell: bash
        run: |
          cat > "$GITHUB_WORKSPACE/binlex-arch-linker-wrapper" <<'EOF'
          #!/bin/bash
          set -euo pipefail

          args=()
          for arg in "$@"; do
            if [[ "$arg" == "-Wl,--as-needed" ]]; then
              args+=("-Wl,--no-as-needed")
            else
              args+=("$arg")
            fi
          done

          exec x86_64-linux-gnu-gcc "${args[@]}"
          EOF
          chmod +x "$GITHUB_WORKSPACE/binlex-arch-linker-wrapper"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=$GITHUB_WORKSPACE/binlex-arch-linker-wrapper" >> "$GITHUB_ENV"

      - name: Install Dependencies (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew list llvm >/dev/null 2>&1 || brew install llvm
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          brew list automake >/dev/null 2>&1 || brew install automake
          brew list autoconf >/dev/null 2>&1 || brew install autoconf
          brew list libtool >/dev/null 2>&1 || brew install libtool

      - name: Configure LLVM Environment (macOS)
        if: startsWith(matrix.os, 'macos-')
        shell: bash
        run: |
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "LLVM_SYS_221_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"
          "${LLVM_PREFIX}/bin/llvm-config" --version

      - name: Install Vulkan SDK (macOS)
        if: startsWith(matrix.os, 'macos-')
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Configure Vulkan Environment (macOS)
        if: startsWith(matrix.os, 'macos-')
        shell: bash
        run: |
          echo "DYLD_FALLBACK_LIBRARY_PATH=$VULKAN_SDK/lib${DYLD_FALLBACK_LIBRARY_PATH:+:$DYLD_FALLBACK_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "VK_ICD_FILENAMES=$VULKAN_SDK/share/vulkan/icd.d/MoltenVK_icd.json" >> "$GITHUB_ENV"
          echo "VK_LAYER_PATH=$VULKAN_SDK/share/vulkan/explicit_layer.d" >> "$GITHUB_ENV"

      - name: Enable Developer Command Prompt (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install LLVM (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $llvmVersion = "${{ env.LLVM_WINDOWS_VERSION }}"
          $archiveName = "clang+llvm-$llvmVersion-x86_64-pc-windows-msvc.tar.xz"
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          $extractRoot = Join-Path $env:RUNNER_TEMP "llvm"
          $extractDir = Join-Path $extractRoot ("clang+llvm-" + $llvmVersion + "-x86_64-pc-windows-msvc")
          curl.exe -L --fail --output $archivePath "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/$archiveName"
          if (Test-Path $extractRoot) { Remove-Item -Recurse -Force $extractRoot }
          New-Item -ItemType Directory -Force -Path $extractRoot | Out-Null
          tar -xf $archivePath -C $extractRoot
          if (-not (Test-Path $extractDir)) {
            Write-Error "LLVM archive extracted to unexpected location: $extractDir"
          }
          "LLVM_SYS_221_PREFIX=$extractDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LIBCLANG_PATH=$extractDir\bin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$extractDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Run Unit Tests (Unix)
        if: ${{ matrix.os != 'windows-latest' && matrix.os != 'archlinux' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            cargo test --workspace --exclude binlex-python && break
            echo "Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done

      - name: Run Unit Tests (Arch Linux)
        if: ${{ matrix.os == 'archlinux' }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            runuser -u builder -- env \
              PATH="/usr/bin:${PATH}" \
              LLVM_SYS_221_PREFIX="/usr" \
              CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER="${CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER}" \
              CARGO_BUILD_JOBS=2 \
              bash -lc "cd /tmp/binlex-build && cargo test --workspace --exclude binlex-python" && break
            if [[ "$attempt" -eq 3 ]]; then
              exit 1
            fi
            echo "Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done

      - name: Run Unit Tests (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: cargo test --workspace ${{ env.WINDOWS_CARGO_EXCLUDES }} --lib --bins

      - name: Build Project (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: make deb

      - name: Build Project (Arch Linux)
        if: ${{ matrix.os == 'archlinux' }}
        shell: bash
        run: |
          set -euo pipefail
          runuser -u builder -- env \
            PATH="/usr/bin:${PATH}" \
            LLVM_SYS_221_PREFIX="/usr" \
            CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER="${CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER}" \
            CARGO_BUILD_JOBS=2 \
            bash -lc "cd /tmp/binlex-build && makepkg"

      - name: Build Project (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: cargo build --release --workspace --exclude binlex-python

      - name: Build Project (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: cargo build --release --workspace ${{ env.WINDOWS_CARGO_EXCLUDES }}

      - name: Create Dist Directory
        run: mkdir -p dist

      - name: Copy Binary (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          copy target\release\binlex.exe dist\
          copy target\release\binlex-mcp.exe dist\
          copy target\release\binlex-server.exe dist\
          copy target\release\binlex-web.exe dist\
          copy target\release\binlex-processor-embeddings.exe dist\
          copy target\release\binlex-yara.exe dist\
          copy target\release\binlex-symbols.exe dist\
          copy target\release\binlex-image.exe dist\
          copy target\release\binlex-hash.exe dist\

      - name: Copy Binary (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          cp target/release/binlex dist/
          cp target/release/binlex-mcp dist/
          cp target/release/binlex-server dist/
          cp target/release/binlex-web dist/
          cp target/release/binlex-processor-vex dist/
          cp target/release/binlex-processor-embeddings dist/
          cp target/release/binlex-yara dist/
          cp target/release/binlex-symbols dist/
          cp target/release/binlex-image dist/
          cp target/release/binlex-hash dist/

      - name: Copy Binary (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          cp target/release/binlex dist/
          cp target/release/binlex-mcp dist/
          cp target/release/binlex-server dist/
          cp target/release/binlex-web dist/
          cp target/release/binlex-processor-vex dist/
          cp target/release/binlex-processor-embeddings dist/
          cp target/release/binlex-yara dist/
          cp target/release/binlex-symbols dist/
          cp target/release/binlex-image dist/
          cp target/release/binlex-hash dist/
          cp target/debian/*.deb dist/

      - name: Copy Binary (Arch Linux)
        if: ${{ matrix.os == 'archlinux' }}
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/binlex-build/target/release/binlex dist/
          cp /tmp/binlex-build/target/release/binlex-mcp dist/
          cp /tmp/binlex-build/target/release/binlex-server dist/
          cp /tmp/binlex-build/target/release/binlex-web dist/
          cp /tmp/binlex-build/target/release/binlex-processor-vex dist/
          cp /tmp/binlex-build/target/release/binlex-processor-embeddings dist/
          cp /tmp/binlex-build/target/release/binlex-yara dist/
          cp /tmp/binlex-build/target/release/binlex-symbols dist/
          cp /tmp/binlex-build/target/release/binlex-image dist/
          cp /tmp/binlex-build/target/release/binlex-hash dist/
          cp /tmp/binlex-build/*.pkg.tar.zst dist/

      - name: Package Native Artifacts (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp -a dist "release/${ASSET_BASENAME}"
          tar -C release -czf "dist/${ASSET_BASENAME}.tar.gz" "${ASSET_BASENAME}"

      - name: Package Native Artifacts (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -Recurse dist "release/$env:ASSET_BASENAME"
          Compress-Archive -Path "release/$env:ASSET_BASENAME" -DestinationPath "dist/$env:ASSET_BASENAME.zip" -Force

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ASSET_BASENAME }}
          path: dist/${{ env.ASSET_BASENAME }}.${{ matrix.archive_ext }}

      - name: Summarize Native Artifacts
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          archive = Path(f"dist/{os.environ['ASSET_BASENAME']}.${{ matrix.archive_ext }}")
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])

          digest = hashlib.sha256()
          with archive.open("rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                  digest.update(chunk)

          with summary.open("a", encoding="utf-8") as handle:
              handle.write("## Native Artifacts (${{ matrix.os }})\n\n")
              handle.write(f"Artifact name: `{os.environ['ASSET_BASENAME']}`\n\n")
              handle.write("| File | Size | SHA-256 |\n")
              handle.write("| --- | ---: | --- |\n")
              handle.write(f"| `{archive.name}` | {archive.stat().st_size:,} bytes | `{digest.hexdigest()}` |\n\n")
          PY

  python-wheels:
    name: python-wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            asset: linux-x86_64
            archive_ext: tar.gz
          - os: macos-14
            runner: macos-14
            asset: macos-14-arm64
            archive_ext: tar.gz
          - os: macos-15-intel
            runner: macos-15-intel
            asset: macos-15-intel-x86_64
            archive_ext: tar.gz
          - os: macos-15
            runner: macos-15
            asset: macos-15-arm64
            archive_ext: tar.gz
          - os: windows-latest
            runner: windows-latest
            asset: windows-x86_64
            archive_ext: zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Resolve Binlex Version
        shell: bash
        run: |
          version="$(./scripts/binlex-version.sh)"
          test -n "${version}"
          echo "BINLEX_VERSION=${version}" >> "$GITHUB_ENV"
          echo "ASSET_BASENAME=binlex-${version}-python-wheels-${{ matrix.asset }}" >> "$GITHUB_ENV"

      - name: Validate Release Tag Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "${TAG_VERSION}" = "${BINLEX_VERSION}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheels-${{ matrix.os }}
          cache-provider: github

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Dependencies (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev make automake autoconf libtool wget gnupg software-properties-common
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.LLVM_MAJOR_VERSION }}
          sudo apt-get install -y llvm-22-dev clang-22 libclang-common-22-dev libpolly-22-dev

      - name: Configure LLVM Environment (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: |
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"
          /usr/lib/llvm-22/bin/llvm-config --version

      - name: Install Dependencies (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew list llvm >/dev/null 2>&1 || brew install llvm
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          brew list automake >/dev/null 2>&1 || brew install automake
          brew list autoconf >/dev/null 2>&1 || brew install autoconf
          brew list libtool >/dev/null 2>&1 || brew install libtool

      - name: Configure LLVM Environment (macOS)
        if: startsWith(matrix.os, 'macos-')
        shell: bash
        run: |
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "LLVM_SYS_221_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "CIBW_ENVIRONMENT_MACOS=MACOSX_DEPLOYMENT_TARGET=11.0 LLVM_SYS_221_PREFIX=${LLVM_PREFIX} PATH=${LLVM_PREFIX}/bin:\$PATH" >> "$GITHUB_ENV"
          "${LLVM_PREFIX}/bin/llvm-config" --version

      - name: Install Vulkan SDK (macOS)
        if: startsWith(matrix.os, 'macos-')
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Configure Vulkan Environment (macOS)
        if: startsWith(matrix.os, 'macos-')
        shell: bash
        run: |
          echo "DYLD_FALLBACK_LIBRARY_PATH=$VULKAN_SDK/lib${DYLD_FALLBACK_LIBRARY_PATH:+:$DYLD_FALLBACK_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "VK_ICD_FILENAMES=$VULKAN_SDK/share/vulkan/icd.d/MoltenVK_icd.json" >> "$GITHUB_ENV"
          echo "VK_LAYER_PATH=$VULKAN_SDK/share/vulkan/explicit_layer.d" >> "$GITHUB_ENV"

      - name: Enable Developer Command Prompt (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install LLVM (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $llvmVersion = "${{ env.LLVM_WINDOWS_VERSION }}"
          $archiveName = "clang+llvm-$llvmVersion-x86_64-pc-windows-msvc.tar.xz"
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          $extractRoot = Join-Path $env:RUNNER_TEMP "llvm"
          $extractDir = Join-Path $extractRoot ("clang+llvm-" + $llvmVersion + "-x86_64-pc-windows-msvc")
          curl.exe -L --fail --output $archivePath "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/$archiveName"
          if (Test-Path $extractRoot) { Remove-Item -Recurse -Force $extractRoot }
          New-Item -ItemType Directory -Force -Path $extractRoot | Out-Null
          tar -xf $archivePath -C $extractRoot
          if (-not (Test-Path $extractDir)) {
            Write-Error "LLVM archive extracted to unexpected location: $extractDir"
          }
          "LLVM_SYS_221_PREFIX=$extractDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LIBCLANG_PATH=$extractDir\bin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$extractDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install Python Build Tools
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel maturin[patchelf]

      - name: Install Python Build Tools (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel maturin

      - name: Build Python Wheels (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        env:
          LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
        run: |
          mkdir -p wheelhouse
          maturin build --manifest-path bindings/python/Cargo.toml --release --out wheelhouse

      - name: Build Python Wheels (cibuildwheel)
        if: ${{ matrix.os != 'ubuntu-latest' }}
        uses: pypa/cibuildwheel@v3.2.0
        env:
          CIBW_BUILD: cp312-* cp313-* cp314-*
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_ENVIRONMENT_LINUX: >-
            PROTOC_VERSION=${{ env.PROTOC_VERSION }}
            PROTOC=/tmp/protoc/bin/protoc
            PATH=/tmp/protoc/bin:/usr/local/bin:$PATH
          CIBW_BEFORE_ALL_LINUX: >-
            if command -v apk >/dev/null 2>&1; then
            apk add --no-cache bash build-base pkgconf openssl-dev make automake autoconf libtool git curl unzip;
            elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y pkgconf-pkg-config openssl-devel make automake autoconf libtool git curl unzip ||
            microdnf install -y pkg-config openssl-devel make automake autoconf libtool git curl unzip;
            elif command -v dnf >/dev/null 2>&1; then
            dnf install -y pkgconf-pkg-config openssl-devel make automake autoconf libtool git curl unzip ||
            dnf install -y pkg-config openssl-devel make automake autoconf libtool git curl unzip;
            elif command -v yum >/dev/null 2>&1; then
            yum install -y pkgconf-pkg-config openssl-devel make automake autoconf libtool git curl unzip ||
            yum install -y pkg-config openssl-devel make automake autoconf libtool git curl unzip;
            elif command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y pkg-config libssl-dev make automake autoconf libtool git curl unzip;
            else
            echo "Unsupported package manager for cibuildwheel linux image" >&2; exit 1;
            fi &&
            mkdir -p /tmp/protoc &&
            curl -fsSL -o /tmp/protoc/protoc.zip https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip &&
            unzip -oq /tmp/protoc/protoc.zip -d /tmp/protoc
          CIBW_ENVIRONMENT_WINDOWS: >-
            LLVM_SYS_221_PREFIX="$LLVM_SYS_221_PREFIX"
        with:
          package-dir: bindings/python
          output-dir: wheelhouse

      - name: Package Wheel Artifacts (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist release
          cp -a wheelhouse "release/${ASSET_BASENAME}"
          tar -C release -czf "dist/${ASSET_BASENAME}.tar.gz" "${ASSET_BASENAME}"

      - name: Package Wheel Artifacts (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -Recurse wheelhouse "release/$env:ASSET_BASENAME"
          Compress-Archive -Path "release/$env:ASSET_BASENAME" -DestinationPath "dist/$env:ASSET_BASENAME.zip" -Force

      - name: Upload Wheel Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ASSET_BASENAME }}
          path: dist/${{ env.ASSET_BASENAME }}.${{ matrix.archive_ext }}

  python-publish-wheels:
    name: python-publish-wheels
    runs-on: ubuntu-latest
    needs: python-wheels
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Resolve Binlex Version
        shell: bash
        run: |
          version="$(./scripts/binlex-version.sh)"
          test -n "${version}"
          echo "BINLEX_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Validate Release Tag Version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "${TAG_VERSION}" = "${BINLEX_VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download Wheel Artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: "binlex-${{ env.BINLEX_VERSION }}-python-wheels-*"
          merge-multiple: true
          path: dist/python-archives

      - name: Extract Wheel Artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/python
          shopt -s nullglob
          for archive in dist/python-archives/*.tar.gz; do
            tar -xzf "$archive" -C dist/python --strip-components=1
          done
          for archive in dist/python-archives/*.zip; do
            unzip -oq "$archive" -d dist/python-tmp
            for directory in dist/python-tmp/*; do
              if [ -d "$directory" ]; then
                cp -a "$directory"/. dist/python/
              fi
            done
            rm -rf dist/python-tmp
          done

      - name: Install Upload Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine

      - name: Check Wheel Distributions
        run: python -m twine check dist/python/*

      - name: Publish Wheels to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m twine upload --non-interactive dist/python/*

  package-build:
    name: package-build (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [ida-plugin, mcp-skills, source-code]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve Binlex Version
        shell: bash
        run: |
          version="$(./scripts/binlex-version.sh)"
          test -n "${version}"
          echo "BINLEX_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Validate Release Tag Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "${TAG_VERSION}" = "${BINLEX_VERSION}"

      - name: Build IDA Plugin Package
        if: matrix.package == 'ida-plugin'
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          mkdir -p dist
          cd plugins/ida/
          python -m pip install .
          python -m build
          python -m plugin archive --output ../../dist/binlex-${{ env.BINLEX_VERSION }}-ida.zip

      - name: Upload IDA Plugin Artifacts
        if: matrix.package == 'ida-plugin'
        uses: actions/upload-artifact@v6
        with:
          name: binlex-${{ env.BINLEX_VERSION }}-ida
          path: dist/binlex-${{ env.BINLEX_VERSION }}-ida.zip

      - name: Create MCP Skills Archive
        if: matrix.package == 'mcp-skills'
        shell: bash
        run: |
          mkdir -p dist
          python - <<'PY'
          import shutil
          import os
          from pathlib import Path

          source = Path("crates/binlex_tools/binlex-mcp/skills")
          archive = Path(f"dist/binlex-{os.environ['BINLEX_VERSION']}-mcp-skills.zip")
          shutil.make_archive(str(archive.with_suffix("")), "zip", root_dir=source.parent, base_dir=source.name)
          PY

      - name: Upload MCP Skills Artifact
        if: matrix.package == 'mcp-skills'
        uses: actions/upload-artifact@v6
        with:
          name: binlex-${{ env.BINLEX_VERSION }}-mcp-skills
          path: dist/binlex-${{ env.BINLEX_VERSION }}-mcp-skills.zip

      - name: Summarize MCP Skills Artifact
        if: matrix.package == 'mcp-skills'
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          archive = Path(f"dist/binlex-{os.environ['BINLEX_VERSION']}-mcp-skills.zip")
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])

          digest = hashlib.sha256()
          with archive.open("rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                  digest.update(chunk)

          with summary.open("a", encoding="utf-8") as handle:
              handle.write("## MCP Skills Artifact\n\n")
              handle.write(f"Artifact name: `binlex-{os.environ['BINLEX_VERSION']}-mcp-skills`\n\n")
              handle.write("| File | Size | SHA-256 |\n")
              handle.write("| --- | ---: | --- |\n")
              handle.write(f"| `{archive.name}` | {archive.stat().st_size:,} bytes | `{digest.hexdigest()}` |\n\n")
          PY

      - name: Create Source Code Archive
        if: matrix.package == 'source-code'
        shell: bash
        run: |
          mkdir -p dist
          git archive --format=tar.gz --prefix="binlex-${BINLEX_VERSION}/" -o "dist/binlex-${BINLEX_VERSION}-source.tar.gz" HEAD

      - name: Upload Source Code Artifact
        if: matrix.package == 'source-code'
        uses: actions/upload-artifact@v6
        with:
          name: binlex-${{ env.BINLEX_VERSION }}-source
          path: dist/binlex-${{ env.BINLEX_VERSION }}-source.tar.gz

      - name: Summarize Source Code Artifact
        if: matrix.package == 'source-code'
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          archive = Path(f"dist/binlex-{os.environ['BINLEX_VERSION']}-source.tar.gz")
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])

          digest = hashlib.sha256()
          with archive.open("rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                  digest.update(chunk)

          with summary.open("a", encoding="utf-8") as handle:
              handle.write("## Source Code Artifact\n\n")
              handle.write(f"Artifact name: `binlex-{os.environ['BINLEX_VERSION']}-source`\n\n")
              handle.write("| File | Size | SHA-256 |\n")
              handle.write("| --- | ---: | --- |\n")
              handle.write(f"| `{archive.name}` | {archive.stat().st_size:,} bytes | `{digest.hexdigest()}` |\n\n")
          PY

      - name: Summarize IDA Plugin Artifact
        if: matrix.package == 'ida-plugin'
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          archive = Path(f"dist/binlex-{os.environ['BINLEX_VERSION']}-ida.zip")
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])

          digest = hashlib.sha256()
          with archive.open("rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                  digest.update(chunk)

          with summary.open("a", encoding="utf-8") as handle:
              handle.write("## IDA Artifact\n\n")
              handle.write(f"Artifact name: `binlex-{os.environ['BINLEX_VERSION']}-ida`\n\n")
              handle.write("| File | Size | SHA-256 |\n")
              handle.write("| --- | ---: | --- |\n")
              handle.write(f"| `{archive.name}` | {archive.stat().st_size:,} bytes | `{digest.hexdigest()}` |\n\n")
          PY

  release-publish:
    name: release-publish
    runs-on: ubuntu-latest
    needs: [native-build, python-wheels, package-build, docs-build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Resolve Binlex Version
        shell: bash
        run: |
          version="$(./scripts/binlex-version.sh)"
          test -n "${version}"
          echo "BINLEX_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Validate Release Tag Version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "${TAG_VERSION}" = "${BINLEX_VERSION}"

      - name: Download Release Artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: binlex-${{ env.BINLEX_VERSION }}-*
          merge-multiple: true
          path: dist/release-assets

      - name: Publish GitHub Release Assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/release-assets/*)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets found" >&2
            exit 1
          fi
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
          fi
          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber

  docker-image:
    name: docker-image (${{ matrix.target }} / ${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: binlex-mcp
            platform: linux/amd64
            runner: ubuntu-latest
            dockerfile: docker/binlex-mcp.Dockerfile
          - target: binlex-mcp
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            dockerfile: docker/binlex-mcp.Dockerfile
          - target: binlex-python
            platform: linux/amd64
            runner: ubuntu-latest
            dockerfile: docker/binlex-python.Dockerfile
          - target: binlex-python
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            dockerfile: docker/binlex-python.Dockerfile
          - target: binlex-server
            platform: linux/amd64
            runner: ubuntu-latest
            dockerfile: docker/binlex-server.Dockerfile
          - target: binlex-server
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            dockerfile: docker/binlex-server.Dockerfile
          - target: binlex-web
            platform: linux/amd64
            runner: ubuntu-latest
            dockerfile: docker/binlex-web.Dockerfile
          - target: binlex-web
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            dockerfile: docker/binlex-web.Dockerfile

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Resolve Binlex Version
        shell: bash
        run: |
          version="$(./scripts/binlex-version.sh)"
          test -n "${version}"
          echo "BINLEX_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Release Tag Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "${TAG_VERSION}" = "${BINLEX_VERSION}"

      - name: Resolve Docker Build Variables
        shell: bash
        run: |
          platform_slug="${{ matrix.platform }}"
          platform_slug="${platform_slug//\//-}"
          digest_artifact="digests-${{ matrix.target }}-${platform_slug}"
          {
            echo "BINLEX_DOCKER_IMAGE=${{ matrix.target }}:${BINLEX_VERSION}-${platform_slug}"
            echo "DIGEST_ARTIFACT=${digest_artifact}"
          } >> "$GITHUB_ENV"

      - name: Build ${{ matrix.target }} Image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          load: true
          push: false
          tags: ${{ env.BINLEX_DOCKER_IMAGE }}
          build-args: |
            BINLEX_IMAGE_VERSION=${{ env.BINLEX_VERSION }}
            BINLEX_IMAGE_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=docker-${{ matrix.target }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.target }}-${{ matrix.platform }}

      - name: Smoke Test binlex-mcp Image
        if: github.event_name == 'pull_request' && matrix.target == 'binlex-mcp'
        shell: bash
        run: docker run --rm "${BINLEX_DOCKER_IMAGE}" binlex-mcp --help

      - name: Smoke Test binlex-python Image
        if: github.event_name == 'pull_request' && matrix.target == 'binlex-python'
        shell: bash
        run: docker run --rm "${BINLEX_DOCKER_IMAGE}" python -c "import binlex"

      - name: Smoke Test binlex-server Image
        if: github.event_name == 'pull_request' && matrix.target == 'binlex-server'
        shell: bash
        run: docker run --rm "${BINLEX_DOCKER_IMAGE}" binlex-server --help

      - name: Smoke Test binlex-web Image
        if: github.event_name == 'pull_request' && matrix.target == 'binlex-web'
        shell: bash
        run: docker run --rm "${BINLEX_DOCKER_IMAGE}" binlex-web --help

      - name: Resolve Docker Tags
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        shell: bash
        env:
          DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -euo pipefail
          tags=()
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            tags+=("${DOCKER_NAMESPACE}/${{ matrix.target }}:latest")
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tags+=("${DOCKER_NAMESPACE}/${{ matrix.target }}:${BINLEX_VERSION}")
          fi
          if [ "${#tags[@]}" -eq 0 ]; then
            exit 1
          fi
          platform_slug="${{ matrix.platform }}"
          platform_slug="${platform_slug//\//-}"
          digest_artifact="digests-${{ matrix.target }}-${platform_slug}"
          {
            echo "DOCKER_IMAGE=${DOCKER_NAMESPACE}/${{ matrix.target }}"
            echo "DIGEST_ARTIFACT=${digest_artifact}"
          } >> "$GITHUB_ENV"

      - name: Log In to Docker Hub
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Publish ${{ matrix.target }} Image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        id: build
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.DOCKER_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            BINLEX_IMAGE_VERSION=${{ env.BINLEX_VERSION }}
            BINLEX_IMAGE_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=docker-${{ matrix.target }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.target }}-${{ matrix.platform }}

      - name: Export Image Digest
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload Image Digest
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIGEST_ARTIFACT }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: docker-manifest (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: docker-image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    strategy:
      fail-fast: false
      matrix:
        target: [binlex-mcp, binlex-python, binlex-server, binlex-web]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Resolve Binlex Version
        shell: bash
        run: |
          version="$(./scripts/binlex-version.sh)"
          test -n "${version}"
          echo "BINLEX_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download AMD64 Digest
        uses: actions/download-artifact@v4
        with:
          name: digests-${{ matrix.target }}-linux-amd64
          path: /tmp/digests

      - name: Download ARM64 Digest
        uses: actions/download-artifact@v4
        with:
          name: digests-${{ matrix.target }}-linux-arm64
          path: /tmp/digests

      - name: Log In to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Resolve Docker Tags
        shell: bash
        env:
          DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -euo pipefail
          tags=()
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            tags+=("${DOCKER_NAMESPACE}/${{ matrix.target }}:latest")
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tags+=("${DOCKER_NAMESPACE}/${{ matrix.target }}:${BINLEX_VERSION}")
          fi
          if [ "${#tags[@]}" -eq 0 ]; then
            exit 1
          fi
          {
            echo 'DOCKER_TAGS<<EOF'
            printf '%s\n' "${tags[@]}"
            echo 'EOF'
            echo "DOCKER_IMAGE=${DOCKER_NAMESPACE}/${{ matrix.target }}"
          } >> "$GITHUB_ENV"

      - name: Create Multi-Arch Manifest
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tags <<< "${DOCKER_TAGS}"
          mapfile -t digests < <(find /tmp/digests -maxdepth 1 -type f -printf '%f\n' | sort)
          test "${#digests[@]}" -eq 2
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(--tag "$tag")
          done
          docker buildx imagetools create \
            "${tag_args[@]}" \
            "${DOCKER_IMAGE}@sha256:${digests[0]}" \
            "${DOCKER_IMAGE}@sha256:${digests[1]}"

  docs-build:
    name: docs-build (${{ matrix.docs }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        docs: [rust, python]
    env:
      RUSTC_WRAPPER: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Resolve Binlex Version
        shell: bash
        run: |
          version="$(./scripts/binlex-version.sh)"
          test -n "${version}"
          echo "BINLEX_VERSION=${version}" >> "$GITHUB_ENV"
          echo "DOCS_ARTIFACT_NAME=binlex-${version}-docs-${{ matrix.docs }}" >> "$GITHUB_ENV"

      - name: Validate Release Tag Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "${TAG_VERSION}" = "${BINLEX_VERSION}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: matrix.docs == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache Cargo Registry and Build
        if: matrix.docs == 'rust'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: docs-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            docs-${{ runner.os }}-cargo-

      - name: Install Dependencies
        if: matrix.docs == 'rust' || matrix.docs == 'python'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev make automake autoconf libtool wget gnupg software-properties-common
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.LLVM_MAJOR_VERSION }}
          sudo apt-get install -y llvm-22-dev clang-22 libclang-common-22-dev libpolly-22-dev

      - name: Configure LLVM Environment
        if: matrix.docs == 'rust' || matrix.docs == 'python'
        shell: bash
        run: |
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"
          /usr/lib/llvm-22/bin/llvm-config --version

      - name: Install Python Build Tools
        if: matrix.docs == 'python'
        run: python -m pip install --upgrade pip

      - name: Build Rust API Docs
        if: matrix.docs == 'rust'
        run: cargo doc -p binlex --no-deps

      - name: Build Python API Docs
        if: matrix.docs == 'python'
        run: |
          cd bindings/python/
          python -m pip install ".[docs]"
          python -m docs

      - name: Upload Rust Docs
        if: matrix.docs == 'rust'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.DOCS_ARTIFACT_NAME }}
          path: target/doc/

      - name: Upload Python Docs
        if: matrix.docs == 'python'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.DOCS_ARTIFACT_NAME }}
          path: bindings/python/docs/
