  docs:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache Cargo Registry and Build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: docs-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            docs-${{ runner.os }}-cargo-

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev make automake autoconf libtool

      - name: Install Python Build Tools
        run: python -m pip install --upgrade pip

      - name: Build Rust API Docs
        run: cargo doc -p binlex --no-deps

      - name: Build Python API Docs
        run: |
          cd bindings/python/
          python -m pip install ".[docs]"
          python -m docs

      - name: Upload Rust Docs
        uses: actions/upload-artifact@v6
        with:
          name: rust-api-docs
          path: target/doc/

      - name: Upload Python Docs
        uses: actions/upload-artifact@v6
        with:
          name: python-api-docs
          path: bindings/python/docs/
